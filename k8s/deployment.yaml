apiVersion: v1
kind: ServiceAccount
metadata:
  name: altair-proxy-lab-web
  namespace: labs-web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: altair-proxy-lab-web
  namespace: labs-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: altair-proxy-lab-web
  template:
    metadata:
      labels:
        app: altair-proxy-lab-web
    spec:
      serviceAccountName: altair-proxy-lab-web
      containers:
        - name: altair-proxy-lab-web
          image: europe-west9-docker.pkg.dev/altair-isen/altair-repo/altair-proxy-lab-web:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "8086"
            - name: RUST_LOG
              value: "info"
            - name: WEB_PROXY_NAMESPACE
              value: "labs-web"
            - name: WEB_PROXY_SERVICE_SUFFIX
              value: "-web"
            - name: WEB_PROXY_REQUEST_TIMEOUT_SECONDS
              value: "30"
          ports:
            - containerPort: 8086
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 8086
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8086
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: altair-web-proxy-internal
  namespace: labs-web
  annotations:
    networking.gke.io/load-balancer-type: "Internal"
spec:
  type: LoadBalancer
  selector:
    app: altair-proxy-lab-web
  ports:
    - name: http
      port: 80
      targetPort: 8086
