name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read
  id-token: write
  security-events: write

jobs:
  ci:
    uses: Projet-technique-Altair/altair-ci/.github/workflows/rust-ms.yml@main
    with:
      gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
      artifact_registry_host: ${{ vars.GCP_ARTIFACT_REGISTRY_HOST }}
      artifact_registry_repo: ${{ vars.GCP_ARTIFACT_REPO }}
      image_name: altair-proxy-lab-web
      workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
      push_service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
